<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elira</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="commmon.js"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #fde2e4, #e7d9ff);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      width: 360px;
      padding: 30px 25px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    img {
      width: 60px;
      height: 60px;
      background: #fde2e4;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h1 span {
      color: #d99ad9;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    .question {
      text-align: left;
      font-weight: bold;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
    }

    button {
      padding: 10px 20px;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      background: #f3c6dd;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- PAGE 0 : USERNAME -->
<div class="card" id="page0">
  <img src="elira-logo1.jpg" alt="Elira">
  <h1>Welcome to <span>Elira</span></h1>
  <div class="subtitle">Let’s start by getting to know you</div>

  <div class="question">Choose a username</div>
  <input type="text" id="username" placeholder="Enter your username">

  <div class="buttons">
    <div></div>
    <button onclick="goToAge()">Next</button>
  </div>
</div>

<!-- PAGE 1 : AGE -->
<div class="card hidden" id="page1">
  <h1>Select <span>Your Age</span></h1>
  <input type="number" id="age" placeholder="Enter your age">

  <div class="buttons">
    <button onclick="goBackToUsername()">Back</button>
    <button onclick="finish()" >Continue</button>
  </div>
</div>



</body>
</html>
